<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Step 1 - Zion's Tank</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Zion's Tank</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="directory.html">Directory</a></li>
                    <li><a href="marketplace.html">Marketplace</a></li>
                    <li><a href="events.html">Events</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="section">
            <div class="container">
                <div class="registration-container">
                    <div class="registration-header">
                        <h2 class="registration-title">Create Your Account</h2>
                        <p class="registration-subtitle">Step 1 of 4 - Basic Information</p>
                    </div>

                    <!-- Progress indicator -->
                    <div class="progress-container">
                        <div class="progress-line"></div>
                        <div class="progress-step active">1</div>
                        <div class="progress-step">2</div>
                        <div class="progress-step">3</div>
                        <div class="progress-step">4</div>
                    </div>

                    <div id="register-message"></div>

                    <div class="form-section">
                        <form id="register-step1-form">
                            <div class="form-group">
                                <label for="firstName">First Name *</label>
                                <input type="text" id="firstName" name="firstName" required placeholder="Enter your first name">
                            </div>

                            <div class="form-group">
                                <label for="lastName">Last Name *</label>
                                <input type="text" id="lastName" name="lastName" required placeholder="Enter your last name">
                            </div>

                            <div class="form-group">
                                <label for="email">Email Address *</label>
                                <input type="email" id="email" name="email" required placeholder="Enter your email address">
                            </div>

                            <div class="form-group">
                                <label for="password">Password *</label>
                                <input type="password" id="password" name="password" required minlength="6" placeholder="Create a password">
                                <div class="form-help">Password must be at least 6 characters long</div>
                            </div>

                            <div class="form-group">
                                <label for="confirmPassword">Confirm Password *</label>
                                <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6" placeholder="Confirm your password">
                            </div>

                            <div class="registration-buttons">
                                <button type="submit" class="btn-primary">Continue to Step 2</button>
                            </div>
                        </form>
                    </div>

                    <div class="registration-links">
                        <p>Already have an account? <a href="login.html">Login here</a></p>
                        <p><a href="index.html">Back to Home</a></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div style="text-align: center; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1);">
                <p style="margin: 0 0 0.5rem 0; color: #E6F3FF; font-size: 0.8rem;">&copy; 2023 Zion's Tank</p>
            </div>
        </div>
    </footer>

    <script>
        // Handle form submission
        document.getElementById('register-step1-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showMessage('register-message', 'Passwords do not match', 'error');
                return;
            }

            // Store form data in sessionStorage
            const formData = new FormData(e.target);
            const userData = {
                firstName: formData.get('firstName'),
                lastName: formData.get('lastName'),
                email: formData.get('email'),
                password: formData.get('password')
            };

            sessionStorage.setItem('registrationData', JSON.stringify(userData));

            // Redirect to step 2
            window.location.href = 'register-step2.html';
        });

        function showMessage(elementId, message, type) {
            const element = document.getElementById(elementId);
            if (element) {
                element.innerHTML = `<div class="message ${type}">${message}</div>`;
            }
        }
    </script>
</body>
</html>
